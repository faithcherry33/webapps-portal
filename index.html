<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우리반 학습 포털</title>
    <meta name="description" content="수업, 학습, 놀이, 학급운영 웹앱을 한곳에서 실행하는 앱 런처형 학습 포털" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="portal-page">
      <header class="hero">
        <div class="hero__text">
          <p class="eyebrow">우리 반 학습 앱 서랍장</p>
          <h1>우리반 학습 포털</h1>
          <p class="hero__description">필요한 학습 앱을 골라 바로 시작하세요.</p>
        </div>
        <button id="adminOpenButton" class="ghost-button" type="button" aria-haspopup="dialog">관리자</button>
      </header>

      <main class="portal-container">
        <section class="control-panel" aria-label="앱 찾기">
          <label class="search-label" for="searchInput">앱 검색</label>
          <div class="search-row">
            <input id="searchInput" class="search-input" type="search" placeholder="앱 이름이나 #태그를 검색하세요" autocomplete="off" />
            <button id="clearSearchButton" class="secondary-button" type="button">검색 지우기</button>
          </div>

          <nav class="category-tabs" aria-label="카테고리">
            <button class="category-tab is-active" data-category="전체" type="button">전체</button>
            <button class="category-tab" data-category="수업" type="button">수업</button>
            <button class="category-tab" data-category="학습" type="button">학습</button>
            <button class="category-tab" data-category="놀이" type="button">놀이</button>
            <button class="category-tab" data-category="학급운영" type="button">학급운영</button>
          </nav>

          <div class="tag-area" aria-label="자주 쓰는 태그">
            <div class="section-title-row">
              <h2>자주 쓰는 태그</h2>
              <button id="clearTagButton" class="text-button" type="button" hidden>태그 해제</button>
            </div>
            <div id="tagList" class="tag-list"></div>
          </div>
        </section>

        <section class="result-summary" aria-live="polite">
          <div>
            <h2 id="resultTitle">전체 앱</h2>
            <p id="resultDescription">등록된 공개 앱을 모두 보여주고 있어요.</p>
          </div>
          <span id="storageModeBadge" class="mode-badge">저장 방식 확인 중</span>
        </section>

        <section id="appGrid" class="app-grid" aria-label="앱 목록"></section>

        <section id="emptyState" class="empty-state" hidden>
          <div class="empty-state__icon">🔎</div>
          <h2>찾는 앱이 없습니다.</h2>
          <p>다른 검색어나 태그로 찾아보세요.</p>
        </section>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

      <div id="adminModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle" hidden>
        <div class="modal__backdrop" data-close-modal></div>
        <div class="modal__panel">
          <div class="modal__header">
            <div>
              <p class="eyebrow">관리자 모드</p>
              <h2 id="adminModalTitle">웹앱 추가</h2>
            </div>
            <button class="icon-button" type="button" data-close-modal aria-label="닫기">×</button>
          </div>

          <section id="adminLoginSection" class="admin-section">
            <p class="helper-text">앱을 추가하려면 관리자 코드를 입력하세요.</p>
            <form id="adminLoginForm" class="stack-form">
              <label for="adminCodeInput">관리자 코드</label>
              <input id="adminCodeInput" type="password" autocomplete="current-password" required />
              <p id="adminLoginError" class="form-error" hidden>관리자 코드가 올바르지 않습니다.</p>
              <button class="primary-button" type="submit">확인</button>
            </form>
          </section>

          <section id="adminPanelSection" class="admin-section" hidden>
            <div class="admin-notice">
              <strong>현재 저장 방식:</strong>
              <span id="adminStorageNotice">확인 중</span>
            </div>

            <form id="appForm" class="app-form">
              <div class="form-grid">
                <div class="form-field">
                  <label for="appTitleInput">앱 제목 <span aria-hidden="true">*</span></label>
                  <input id="appTitleInput" type="text" placeholder="예: 독서 퀴즈 풀기" required />
                </div>
                <div class="form-field">
                  <label for="appUrlInput">앱 링크 <span aria-hidden="true">*</span></label>
                  <input id="appUrlInput" type="url" placeholder="https://example.com" required />
                </div>
              </div>

              <div class="form-grid">
                <div class="form-field">
                  <label for="appCategorySelect">카테고리 <span aria-hidden="true">*</span></label>
                  <select id="appCategorySelect" required>
                    <option value="수업">수업</option>
                    <option value="학습">학습</option>
                    <option value="놀이">놀이</option>
                    <option value="학급운영">학급운영</option>
                  </select>
                </div>
                <div class="form-field">
                  <label for="appTagsInput">태그</label>
                  <input id="appTagsInput" type="text" placeholder="독서, 퀴즈, 문해력" />
                </div>
              </div>

              <div class="form-field">
                <label for="appDescriptionInput">간단 설명</label>
                <textarea id="appDescriptionInput" rows="3" placeholder="학생이 앱의 용도를 이해할 수 있게 한 문장으로 적어 주세요."></textarea>
              </div>

              <div class="thumbnail-row">
                <div class="form-field">
                  <label for="appThumbnailInput">썸네일 이미지</label>
                  <input id="appThumbnailInput" type="file" accept="image/png,image/jpeg,image/jpg,image/webp" />
                  <p class="helper-text">권장 비율 16:9, 2MB 이하. 큰 이미지는 자동으로 줄입니다.</p>
                </div>
                <div id="thumbnailPreview" class="thumbnail-preview" aria-label="썸네일 미리보기">미리보기</div>
              </div>

              <label class="checkbox-row">
                <input id="appPublishedInput" type="checkbox" checked />
                <span>학생 화면에 공개</span>
              </label>

              <div id="formError" class="form-error" hidden></div>

              <div class="form-actions">
                <button class="primary-button" type="submit">저장하기</button>
                <button id="resetFormButton" class="secondary-button" type="button">입력 지우기</button>
              </div>
            </form>

            <hr class="divider" />

            <div class="admin-list-header">
              <h3>등록된 앱</h3>
              <div class="admin-tools">
                <button id="exportButton" class="secondary-button" type="button">JSON 내보내기</button>
                <label class="secondary-button import-label" for="importInput">JSON 가져오기</label>
                <input id="importInput" type="file" accept="application/json" hidden />
              </div>
            </div>
            <div id="adminAppList" class="admin-app-list"></div>
          </section>
        </div>
      </div>
    </div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
